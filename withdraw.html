<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Profits - GiganticDataHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f4f7fe;
            --text-main: #1e293b;
            --primary-blue: #0052cc;
            --accent-orange: #f06529;
            --white: #ffffff;
            --error: #ef4444;
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); padding-bottom: 50px; }

        .header {
            background: #003366; color: white; padding: 20px;
            display: flex; align-items: center; gap: 15px;
            position: sticky; top: 0; z-index: 100;
        }
        .header a { color: white; text-decoration: none; font-size: 20px; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        .balance-card {
            background: linear-gradient(135deg, #003366 0%, var(--primary-blue) 100%);
            border-radius: 24px; padding: 30px; color: white;
            text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0, 51, 102, 0.15);
        }
        .balance-label { font-size: 13px; opacity: 0.8; text-transform: uppercase; letter-spacing: 1px; }
        .balance-amount { font-size: 36px; font-weight: 900; margin-top: 10px; }

        .withdraw-form {
            background: var(--white); border-radius: 20px; padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .input-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #64748b; }
        
        input, select {
            width: 100%; padding: 14px; border-radius: 12px;
            border: 2px solid #e2e8f0; font-size: 16px; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--accent-orange); }

        .note {
            font-size: 12px; color: #64748b; background: #f1f5f9;
            padding: 12px; border-radius: 10px; margin-bottom: 20px;
            line-height: 1.5; border-left: 4px solid var(--accent-orange);
        }

        .btn-withdraw {
            width: 100%; padding: 16px; border-radius: 14px;
            border: none; background: linear-gradient(135deg, #f06529 0%, #c02425 100%);
            color: white; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s;
        }
        .btn-withdraw:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Status Overlay */
        #loader {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; display: none;
        }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-circle-notch fa-spin" style="font-size: 30px; color: var(--primary-blue);"></i></div>

    <div class="header">
        <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
        <h1 style="font-size: 18px;">Withdraw Earnings</h1>
    </div>

    <div class="container">
        <div class="balance-card">
            <div class="balance-label">Withdrawable Profit</div>
            <div class="balance-amount" id="profitDisplay">GH₵ 0.00</div>
        </div>

        <div class="withdraw-form">
            <div class="note">
                <i class="fas fa-info-circle"></i> 
                Minimum withdrawal is <b>GH₵ 5.00</b>. Requests are usually processed within 1-24 hours.
            </div>

            <div class="input-group">
                <label>Amount (GH₵)</label>
                <input type="number" id="withdrawAmount" placeholder="Min 5.00" step="0.01">
            </div>

            <div class="input-group">
                <label>Select Network</label>
                <select id="network">
                    <option value="MTN">MTN Mobile Money</option>
                    <option value="Telecel">Telecel Cash</option>
                    <option value="AirtelTigo">AirtelTigo Money</option>
                </select>
            </div>

            <div class="input-group">
                <label>Wallet Number</label>
                <input type="tel" id="walletNumber" placeholder="e.g. 054XXXXXXX">
            </div>

            <div class="input-group">
                <label>Account Name</label>
                <input type="text" id="accountName" placeholder="Full name on mobile money">
            </div>

            <button class="btn-withdraw" id="submitBtn" onclick="processWithdrawal()">Request Withdrawal</button>
        </div>
    </div>

                });
            } else {
                window.location.href = "login.html";
            }
        });
