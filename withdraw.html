<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings Manager - Gigantic Data</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #1e293b;
            --bg: #f4f7ff;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--secondary); padding: 20px; }
        .container { max-width: 480px; margin: auto; }

        .store-header {
            background: var(--white);
            padding: 15px 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }
        .store-logo { width: 45px; height: 45px; background: #e0e7ff; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 20px; }
        .store-info h4 { font-size: 14px; font-weight: 800; color: #0f172a; }
        .store-info p { font-size: 11px; color: #64748b; }

        .balance-card {
            background: linear-gradient(135deg, #1e293b 0%, #4f46e5 100%);
            border-radius: 28px; padding: 35px; color: white; text-align: center;
            box-shadow: 0 15px 30px rgba(79, 70, 229, 0.2); margin-bottom: 25px;
        }
        .balance-label { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.8; font-weight: 700; }
        .balance-val { font-size: 45px; font-weight: 900; margin: 10px 0; }

        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 5px; border-radius: 15px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 11px; background: transparent; 
               font-weight: 700; color: #64748b; cursor: pointer; font-size: 13px; }
        .tab.active { background: var(--white); color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .form-box { background: var(--white); padding: 25px; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); }
        .hidden { display: none; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 800; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 2px solid #f1f5f9; font-size: 15px; outline: none; font-weight: 600; }
        input:focus { border-color: var(--primary); background: #f8fafc; }

        .btn { width: 100%; padding: 16px; border: none; border-radius: 14px; color: white; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; letter-spacing: 1px; }
        .btn-w { background: #f97316; }
        .btn-c { background: var(--primary); }

        #loader { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.9); display: none; align-items: center; justify-content: center; z-index: 1000; color: white; flex-direction: column; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div id="loader">
    <i class="fas fa-sync fa-spin fa-3x" style="color: #6366f1"></i>
    <h3 style="margin-top: 20px; letter-spacing: 1px;">PROCESSING ORDERS</h3>
    <p style="font-size: 12px; opacity: 0.7; margin-top: 10px;">Summing store profit & clearing history...</p>
</div>

<div class="container">
    <div class="store-header">
        <div class="store-logo"><i class="fas fa-shop"></i></div>
        <div class="store-info">
            <h4 id="storeName">Fetching Orders...</h4>
            <p id="storeEmail">Verifying Sales</p>
        </div>
    </div>

    <div class="balance-card">
        <div class="balance-label">Unpaid Store Profit</div>
        <div class="balance-val" id="profitVal">₵ 0.00</div>
        <div style="font-size: 10px; background: rgba(255,255,255,0.1); display: inline-block; padding: 5px 12px; border-radius: 20px;">
            <i class="fas fa-history"></i> Calculated from Orders
        </div>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="toggleTab('w')">Withdraw</button>
        <button id="t2" class="tab" onclick="toggleTab('c')">Wallet</button>
    </div>

    <div id="wBox" class="form-box">
        <div class="input-group">
            <label>Amount (₵)</label>
            <input type="number" id="wAmt" placeholder="0.00" step="0.01">
        </div>
        <div class="input-group">
            <label>Network</label>
            <select id="wNet">
                <option value="MTN">MTN Mobile Money</option>
                <option value="Telecel">Telecel Cash</option>
                <option value="AirtelTigo">AirtelTigo</option>
            </select>
        </div>
        <div class="input-group">
            <label>Receiver Number</label>
            <input type="tel" id="wNum" placeholder="0XXXXXXXXX">
        </div>
        <button class="btn btn-w" onclick="handleAction('WITHDRAW')">Request Settlement</button>
    </div>

    <div id="cBox" class="form-box hidden">
        <div class="input-group">
            <label>Amount to Convert (₵)</label>
            <input type="number" id="cAmt" placeholder="0.00" step="0.01">
        </div>
        <button class="btn btn-c" onclick="handleAction('CONVERT')">Add to Wallet</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, runTransaction, push, remove, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
        authDomain: "gigantic-data.firebaseapp.com",
        databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
        projectId: "gigantic-data"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;
    let calculatedProfit = 0;

    window.toggleTab = (t) => {
        document.getElementById('wBox').classList.toggle('hidden', t === 'c');
        document.getElementById('cBox').classList.toggle('hidden', t === 'w');
        document.getElementById('t1').classList.toggle('active', t === 'w');
        document.getElementById('t2').classList.toggle('active', t === 'c');
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            
            // 1. Get Store Settings (Name/Email)
            onValue(ref(db, `users/${user.uid}`), (uSnap) => {
                const uData = uSnap.val();
                if(uData) {
                    document.getElementById('storeName').innerText = uData.storeSettings?.storeName || "My Store";
                    document.getElementById('storeEmail').innerText = user.email;
                }
            });

            // 2. READ BALANCE FROM STORE ORDERS ONLY
            onValue(ref(db, `user_orders/${user.uid}`), (orderSnap) => {
                let total = 0;
                const orders = orderSnap.val();
                if (orders) {
                    // Loop through orders and sum up the commissions
                    Object.values(orders).forEach(order => {
                        total += parseFloat(order.commission || 0);
                    });
                }
                calculatedProfit = total;
                document.getElementById('profitVal').innerText = `₵ ${calculatedProfit.toFixed(2)}`;
            });

        } else { window.location.href = "login.html"; }
    });

    window.handleAction = async (type) => {
        const amount = parseFloat(document.getElementById(type === 'WITHDRAW' ? 'wAmt' : 'cAmt').value);

        if (!amount || amount <= 0) return alert("Please enter a valid amount.");
        if (amount > calculatedProfit) return alert("Insufficient profit from orders.");

        document.getElementById('loader').style.display = 'flex';

        try {
            // A. UPDATE MAIN BALANCE IF CONVERTING
            if (type === 'CONVERT') {
                const userRef = ref(db, `users/${currentUser.uid}`);
                await runTransaction(userRef, (user) => {
                    if (user) {
                        user.balance = parseFloat(((user.balance || 0) + amount).toFixed(2));
                    }
                    return user;
                });
            }

            // B. SEND WITHDRAWAL TO ADMIN
            if (type === 'WITHDRAW') {
                await push(ref(db, 'withdrawals'), {
                    uid: currentUser.uid,
                    store: document.getElementById('storeName').innerText,
                    email: currentUser.email,
                    amount: amount,
                    method: document.getElementById('wNet').value,
                    number: document.getElementById('wNum').value,
                    status: 'pending',
                    timestamp: serverTimestamp()
                });
            }

            // C. WIPE STORE ORDERS (AS REQUESTED)
            // This resets the order-based balance to 0
            await remove(ref(db, `user_orders/${currentUser.uid}`));
            
            alert("Success! Order history has been cleared.");
            document.getElementById('wAmt').value = "";
            document.getElementById('cAmt').value = "";

        } catch (e) {
            alert("Error: " + e.message);
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    };
</script>
</body>
</html>
