<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Profits - GiganticDataHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-body: #f4f7fe;
            --text-main: #1e293b;
            --primary-blue: #0052cc;
            --accent-orange: #f06529;
            --white: #ffffff;
            --indigo: #6366f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-body); color: var(--text-main); padding-bottom: 50px; }

        .header {
            background: #003366; color: white; padding: 20px;
            display: flex; align-items: center; gap: 15px;
            position: sticky; top: 0; z-index: 100;
        }
        .header a { color: white; text-decoration: none; font-size: 20px; }

        .container { padding: 20px; max-width: 500px; margin: 0 auto; }

        .balance-card {
            background: linear-gradient(135deg, #0f172a 0%, var(--primary-blue) 100%);
            border-radius: 24px; padding: 30px; color: white;
            text-align: center; margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0, 51, 102, 0.15);
        }
        .balance-label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        .balance-amount { font-size: 38px; font-weight: 900; margin-top: 10px; font-style: italic; }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            background: #e2e8f0; font-weight: 700; font-size: 13px; cursor: pointer; color: #64748b;
        }
        .tab-btn.active { background: var(--white); color: var(--primary-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        .form-section { background: var(--white); border-radius: 24px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .hidden { display: none; }

        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 800; margin-bottom: 8px; color: #94a3b8; text-transform: uppercase; }
        
        input, select {
            width: 100%; padding: 14px; border-radius: 14px;
            border: 2px solid #f1f5f9; font-size: 16px; outline: none; font-weight: 600;
        }
        input:focus { border-color: var(--indigo); background: #f8fafc; }

        .btn-action {
            width: 100%; padding: 16px; border-radius: 16px; border: none;
            color: white; font-size: 15px; font-weight: 800; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; letter-spacing: 1px;
        }
        .btn-withdraw { background: linear-gradient(135deg, #f06529 0%, #c02425 100%); }
        .btn-convert { background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%); }
        
        #loader {
            position: fixed; inset: 0; background: rgba(2, 6, 23, 0.8);
            display: none; align-items: center; justify-content: center; z-index: 1000; color: white;
        }
    </style>
</head>
<body>

    <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i></div>

    <div class="header">
        <a href="dashboard.html"><i class="fas fa-chevron-left"></i></a>
        <h1 style="font-size: 16px; font-weight: 800; text-transform: uppercase;">Earnings Manager</h1>
    </div>

    <div class="container">
        <div class="balance-card">
            <div class="balance-label">Current Profit Balance</div>
            <div class="balance-amount" id="profitDisplay">₵ 0.00</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('withdraw')">Withdraw to MoMo</button>
            <button class="tab-btn" onclick="switchTab('convert')">Convert to Wallet</button>
        </div>

        <div id="withdrawSection" class="form-section">
            <div class="input-group">
                <label>Amount (Min ₵5.00)</label>
                <input type="number" id="withdrawAmount" placeholder="0.00">
            </div>
            <div class="input-group">
                <label>Network</label>
                <select id="network">
                    <option value="MTN">MTN Mobile Money</option>
                    <option value="Telecel">Telecel Cash</option>
                    <option value="AirtelTigo">AirtelTigo</option>
                </select>
            </div>
            <div class="input-group">
                <label>MoMo Number</label>
                <input type="tel" id="walletNumber" placeholder="024XXXXXXX">
            </div>
            <div class="input-group">
                <label>Account Name</label>
                <input type="text" id="accountName" placeholder="Name on ID">
            </div>
            <button class="btn-action btn-withdraw" onclick="handleWithdraw()">Confirm Withdrawal</button>
        </div>

        <div id="convertSection" class="form-section hidden">
            <div style="background: #eef2ff; padding: 15px; border-radius: 12px; margin-bottom: 20px;">
                <p style="font-size: 12px; color: #4338ca; font-weight: 600;">
                    <i class="fas fa-exchange-alt"></i> Funds will be moved instantly to your main purchase wallet.
                </p>
            </div>
            <div class="input-group">
                <label>Amount to Convert</label>
                <input type="number" id="convertAmount" placeholder="0.00">
            </div>
            <button class="btn-action btn-convert" onclick="handleConvert()">Convert Instantly</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, onValue, runTransaction, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
            authDomain: "gigantic-data.firebaseapp.com",
            databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
            projectId: "gigantic-data"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentProfit = 0;
        let currentUser = null;

        window.switchTab = (type) => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            if(type === 'withdraw') {
                document.getElementById('withdrawSection').classList.remove('hidden');
                document.getElementById('convertSection').classList.add('hidden');
            } else {
                document.getElementById('withdrawSection').classList.add('hidden');
                document.getElementById('convertSection').classList.remove('hidden');
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                onValue(ref(db, `users/${user.uid}`), (snap) => {
                    const data = snap.val();
                    // Maps to the referralBonus field used in your store order script
                    currentProfit = data.referralBonus || data.profitBalance || 0;
                    document.getElementById('profitDisplay').innerText = `₵ ${Number(currentProfit).toFixed(2)}`;
                });
            } else { window.location.href = "login.html"; }
        });

        // SHARED TRANSACTION LOGIC
        async function processFinancialTask(amount, type, details = {}) {
            if (amount < 5) return alert("Minimum amount is ₵5.00");
            if (amount > currentProfit) return alert("Insufficient profit balance!");

            document.getElementById('loader').style.display = 'flex';
            const userRef = ref(db, `users/${currentUser.uid}`);

            try {
                const result = await runTransaction(userRef, (userData) => {
                    if (userData) {
                        // Use referralBonus as the source
                        const profitKey = 'referralBonus';
                        if ((userData[profitKey] || 0) >= amount) {
                            userData[profitKey] -= amount;
                            
                            // If converting, add to main balance
                            if (type === 'CONVERT') {
                                userData.balance = (userData.balance || 0) + amount;
                            }
                        } else { return; }
                    }
                    return userData;
                });

                if (result.committed) {
                    if (type === 'WITHDRAW') {
                        await push(ref(db, 'withdrawals'), {
                            uid: currentUser.uid,
                            email: currentUser.email,
                            amount, ...details,
                            status: 'pending',
                            timestamp: serverTimestamp()
                        });
                        alert("Withdrawal request submitted!");
                    } else {
                        alert("Successfully converted to main wallet!");
                    }
                }
            } catch (e) { alert("Error: " + e.message); }
            document.getElementById('loader').style.display = 'none';
        }

        window.handleWithdraw = () => {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            const method = document.getElementById('network').value;
            const number = document.getElementById('walletNumber').value;
            const name = document.getElementById('accountName').value;
            if(!number || !name) return alert("Fill all fields");
            processFinancialTask(amount, 'WITHDRAW', { method, accountNumber: number, accountName: name });
        };

        window.handleConvert = () => {
            const amount = parseFloat(document.getElementById('convertAmount').value);
            processFinancialTask(amount, 'CONVERT');
        };
    </script>
</body>
</html>
