<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Earnings Manager - GiganticDataHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #f4f7fe; --blue: #0052cc; --white: #ffffff; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }
        body { background: var(--bg); color: #1e293b; padding: 20px; }
        .container { max-width: 450px; margin: auto; }
        .store-header { background: white; padding: 15px; border-radius: 15px; display: flex; align-items: center; gap: 12px; margin-bottom: 15px; border: 1px solid #ddd; }
        .balance-card { background: linear-gradient(135deg, #0f172a, var(--blue)); border-radius: 20px; padding: 30px; color: white; text-align: center; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab { flex: 1; padding: 12px; border: none; border-radius: 10px; background: #ddd; font-weight: bold; cursor: pointer; }
        .tab.active { background: var(--blue); color: white; }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .hidden { display: none; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #eee; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="store-header">
        <i class="fas fa-store-alt" style="color:var(--blue)"></i>
        <div>
            <h4 id="storeNameDisp">Loading...</h4>
            <p id="emailDisp" style="font-size:10px; color:#888"></p>
        </div>
    </div>

    <div class="balance-card">
        <small style="opacity:0.7">WITHDRAWABLE PROFIT</small>
        <h1 id="profitDisp" style="font-size:35px">₵ 0.00</h1>
    </div>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="show('withdraw')">Withdraw</button>
        <button id="t2" class="tab" onclick="show('convert')">Convert</button>
    </div>

    <div id="withdrawBox" class="box">
        <input type="number" id="wAmt" placeholder="Amount">
        <select id="net"><option>MTN</option><option>Telecel</option><option>AirtelTigo</option></select>
        <input type="tel" id="num" placeholder="MoMo Number">
        <input type="text" id="name" placeholder="Account Name">
        <button class="btn" style="background:#f06529" onclick="doWork('WITHDRAW')">Request Cashout</button>
    </div>

    <div id="convertBox" class="box hidden">
        <input type="number" id="cAmt" placeholder="Amount to Convert">
        <button class="btn" style="background:#6366f1" onclick="doWork('CONVERT')">Move to Main Wallet</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, runTransaction, push, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
        authDomain: "gigantic-data.firebaseapp.com",
        databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
        projectId: "gigantic-data"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    let currentUser = null;
    let balance = 0;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            onValue(ref(db, `users/${user.uid}`), (snap) => {
                const d = snap.val();
                // THIS MUST MATCH THE STORE PAGE FIELD
                balance = d.referralBonus || 0;
                document.getElementById('profitDisp').innerText = `₵ ${balance.toFixed(2)}`;
                document.getElementById('storeNameDisp').innerText = d.storeSettings?.storeName || "Agent Store";
                document.getElementById('emailDisp').innerText = user.email;
            });
        } else { window.location.href="login.html"; }
    });

    window.show = (type) => {
        document.getElementById('withdrawBox').classList.toggle('hidden', type === 'convert');
        document.getElementById('convertBox').classList.toggle('hidden', type === 'withdraw');
        document.getElementById('t1').classList.toggle('active', type === 'withdraw');
        document.getElementById('t2').classList.toggle('active', type === 'convert');
    };

    window.doWork = async (type) => {
        const amt = parseFloat(type === 'WITHDRAW' ? document.getElementById('wAmt').value : document.getElementById('cAmt').value);
        if(!amt || amt > balance) return alert("Invalid amount or insufficient funds");

        const userRef = ref(db, `users/${currentUser.uid}`);
        const result = await runTransaction(userRef, (u) => {
            if (u) {
                u.referralBonus = (u.referralBonus || 0) - amt;
                if(type === 'CONVERT') u.balance = (u.balance || 0) + amt;
            }
            return u;
        });

        if(result.committed && type === 'WITHDRAW') {
            await push(ref(db, 'withdrawals'), { uid: currentUser.uid, amount: amt, status: 'pending', timestamp: serverTimestamp() });
        }
        alert("Success!");
    };
</script>
</body>
</html>
