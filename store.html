<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gigantic Data Store</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .step-inactive { opacity: 0.15; pointer-events: none; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <h1 id="storeName" class="text-3xl font-black italic uppercase">Loading Store...</h1>
            <p id="greeting" class="text-indigo-400 text-[10px] uppercase tracking-widest mt-2">Connecting...</p>
        </div>

        <div class="glass-card rounded-[2.5rem] p-8">
            <div class="mb-6">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">1. Network</label>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="selectNet('MTN')" class="bg-slate-900 p-3 rounded-xl border border-white/5 text-[10px] font-bold">MTN</button>
                    <button onclick="selectNet('AIRTELTIGO')" class="bg-slate-900 p-3 rounded-xl border border-white/5 text-[10px] font-bold">AT</button>
                    <button onclick="selectNet('TELECEL')" class="bg-slate-900 p-3 rounded-xl border border-white/5 text-[10px] font-bold">TEL</button>
                </div>
            </div>

            <div id="step2" class="step-inactive mb-6">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">2. Phone Number</label>
                <input type="tel" id="phoneNumber" maxlength="10" placeholder="024XXXXXXX" class="w-full bg-slate-950 border border-white/10 rounded-xl p-4 text-white outline-none">
            </div>

            <div id="step3" class="step-inactive mb-6">
                <label class="block text-[10px] font-bold text-slate-500 uppercase mb-3">3. Data Plan</label>
                <select id="dataPlan" onchange="updateTotal()" class="w-full bg-slate-950 border border-white/10 rounded-xl p-4 text-white outline-none">
                    <option value="">Select Plan</option>
                </select>
            </div>

            <div id="summary" class="hidden bg-indigo-500/10 p-4 rounded-2xl border border-indigo-500/20 mb-6">
                <div class="flex justify-between text-xs"><span>Total to Pay:</span><span id="displayTotal" class="font-bold text-lg">₵ 0.00</span></div>
            </div>

            <button id="payBtn" onclick="pay()" disabled class="w-full py-5 rounded-2xl bg-indigo-600 font-bold uppercase tracking-widest disabled:opacity-20">Purchase Now</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
            authDomain: "gigantic-data.firebaseapp.com",
            databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
            projectId: "gigantic-data"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let agentUid = "";
        let agentEmail = "";
        let selectedNetwork = "";
        let finalPrice = 0;

        const plans = {
            MTN: [{n:"1GB",p:5}], AIRTELTIGO: [{n:"1GB",p:5}], TELECEL: [{n:"1GB",p:5}]
        };

        const urlParams = new URLSearchParams(window.location.search);
        const storeSlug = urlParams.get('s');

        async function init() {
            if(!storeSlug) return;
            const snap = await db.ref(`slugs/${storeSlug}`).once('value');
            if(snap.exists()) {
                agentUid = snap.val();
                const uSnap = await db.ref(`users/${agentUid}`).once('value');
                const u = uSnap.val();
                document.getElementById('storeName').innerText = u.storeSettings.storeName;
                agentEmail = u.email;
                document.getElementById('greeting').innerText = "Terminal Online";
            }
        }
        init();

        window.selectNet = (net) => {
            selectedNetwork = net;
            const sel = document.getElementById('dataPlan');
            sel.innerHTML = '<option>Select Plan</option>';
            plans[net].forEach(x => sel.innerHTML += `<option value="${x.p}">${x.n} - ₵${x.p}</option>`);
            document.getElementById('step2').classList.remove('step-inactive');
            document.getElementById('step3').classList.remove('step-inactive');
        };

        document.getElementById('phoneNumber').oninput = (e) => { if(e.target.value.length === 10) document.getElementById('summary').classList.remove('hidden'); };

        window.updateTotal = () => {
            finalPrice = parseFloat(document.getElementById('dataPlan').value);
            document.getElementById('displayTotal').innerText = `₵ ${finalPrice.toFixed(2)}`;
            document.getElementById('payBtn').disabled = false;
        };

        function pay() {
            PaystackPop.setup({
                key: 'pk_live_faecdb3166144fadebd8269829343698dd43de63',
                email: agentEmail || 'customer@gigantic.com',
                amount: finalPrice * 100,
                currency: 'GHS',
                callback: (res) => {
                    const comm = finalPrice * 0.10; // 10% commission
                    // UPDATE THE PROFIT FIELD
                    db.ref(`users/${agentUid}/referralBonus`).transaction(curr => (curr || 0) + comm);
                    alert("Success! Commission added to " + agentEmail);
                }
            }).openIframe();
        }
    </script>
</body>
</html>
