<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Withdrawal Requests</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats { display: grid; grid-template-cols: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h3 { font-size: 12px; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; }
        .stat-card p { font-size: 24px; font-weight: 800; }

        .request-list { display: flex; flex-direction: column; gap: 15px; }
        .request-card { 
            background: var(--card); padding: 20px; border-radius: 20px; 
            display: grid; grid-template-columns: 2fr 1.5fr 1fr 1.5fr; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); transition: 0.3s;
        }
        .request-card:hover { border-color: var(--primary); }

        .user-info h4 { font-size: 14px; margin-bottom: 4px; }
        .user-info p { font-size: 11px; color: #94a3b8; }

        .payment-info { font-weight: 700; color: #cbd5e1; font-size: 13px; }
        .amount { color: var(--success); font-weight: 900; font-size: 18px; }

        .actions { display: flex; gap: 10px; justify-content: flex-end; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 12px; transition: 0.2s; }
        .btn-approve { background: var(--success); color: white; }
        .btn-reject { background: var(--danger); color: white; }
        .btn-copy { background: #334155; color: white; margin-left: 5px; }
        
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: #f59e0b; color: #000; }

        @media (max-width: 768px) {
            .request-card { grid-template-columns: 1fr; gap: 15px; text-align: center; }
            .actions { justify-content: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <h1>Withdrawals</h1>
            <p style="color: #94a3b8; font-size: 13px;">Manage agent payout requests</p>
        </div>
        <button class="btn" style="background: var(--primary)" onclick="location.reload()"><i class="fas fa-sync"></i> Refresh</button>
    </div>

    <div class="stats">
        <div class="stat-card"><h3>Pending Requests</h3><p id="statPending">0</p></div>
        <div class="stat-card"><h3>Total Payouts</h3><p id="statTotal">₵ 0.00</p></div>
    </div>

    <div id="requestContainer" class="request-list">
        <div style="text-align: center; padding: 50px; opacity: 0.5;">
            <i class="fas fa-inbox fa-3x"></i>
            <p style="margin-top:10px">Searching for requests...</p>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
        authDomain: "gigantic-data.firebaseapp.com",
        databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
        projectId: "gigantic-data"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const requestContainer = document.getElementById('requestContainer');

    // Listen for Withdrawal Requests
    onValue(ref(db, 'withdrawals'), (snapshot) => {
        requestContainer.innerHTML = "";
        let pendingCount = 0;
        let totalValue = 0;

        if (!snapshot.exists()) {
            requestContainer.innerHTML = '<div style="text-align:center; padding:50px">No pending requests.</div>';
            return;
        }

        snapshot.forEach((child) => {
            const data = child.val();
            const id = child.key;

            if (data.status === 'pending') {
                pendingCount++;
                totalValue += parseFloat(data.amount);

                const card = document.createElement('div');
                card.className = 'request-card';
                card.innerHTML = `
                    <div class="user-info">
                        <h4>${data.store || 'Unknown Store'}</h4>
                        <p>${data.email}</p>
                        <span class="status-badge status-pending">Pending</span>
                    </div>
                    <div class="payment-info">
                        ${data.method}<br>
                        <span style="color:var(--primary)">${data.number}</span>
                        <button class="btn-copy" onclick="copyNum('${data.number}')"><i class="far fa-copy"></i></button><br>
                        <small style="font-weight:400; font-size:10px">${data.accountName || 'No Name'}</small>
                    </div>
                    <div class="amount">₵${parseFloat(data.amount).toFixed(2)}</div>
                    <div class="actions">
                        <button class="btn btn-approve" onclick="updateStatus('${id}', 'completed')">Paid</button>
                        <button class="btn btn-reject" onclick="deleteRequest('${id}')">Delete</button>
                    </div>
                `;
                requestContainer.appendChild(card);
            }
        });

        document.getElementById('statPending').innerText = pendingCount;
        document.getElementById('statTotal').innerText = `₵ ${totalValue.toFixed(2)}`;
    });

    // Mark as Paid
    window.updateStatus = (id, status) => {
        if(confirm("Confirm payout completed? This will move it to history.")){
            update(ref(db, `withdrawals/${id}`), { status: status })
            .then(() => alert("Request marked as Completed"));
        }
    };

    // Delete Request
    window.deleteRequest = (id) => {
        if(confirm("Are you sure you want to delete this request?")){
            remove(ref(db, `withdrawals/${id}`));
        }
    };

    // Copy Number Helper
    window.copyNum = (num) => {
        navigator.clipboard.writeText(num);
        alert("Number copied: " + num);
    };
</script>

</body>
</html>
