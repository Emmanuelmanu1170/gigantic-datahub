<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Hub | Gigantic Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050816; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .accent-gradient { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .stat-glow { box-shadow: 0 0 20px rgba(249, 115, 22, 0.15); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center border-b border-white/5">
        <div>
            <h1 class="text-xl font-bold tracking-tight">Agent Dashboard</h1>
            <p id="agentName" class="text-slate-400 text-xs italic">Syncing store data...</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-orange-500/20 border border-orange-500/30 flex items-center justify-center text-orange-500">
            <i class="fas fa-user-tie"></i>
        </div>
    </header>

    <div class="p-6 max-w-lg mx-auto space-y-6">
        
        <div class="glass-card rounded-[2.5rem] p-8 relative overflow-hidden stat-glow">
            <div class="absolute top-0 right-0 p-6 opacity-10 text-6xl"><i class="fas fa-store"></i></div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-500">Store Profit (15%)</label>
            <div class="flex items-baseline gap-2 mt-2">
                <span class="text-4xl font-black italic" id="profitBalance">₵0.00</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="window.location.href='withdraw.html'" class="accent-gradient py-4 rounded-2xl font-bold text-sm uppercase tracking-tighter shadow-lg shadow-orange-500/20 active:scale-95 transition">
                    <i class="fas fa-wallet mr-2"></i> Payouts
                </button>
                <button onclick="copyStoreLink()" class="bg-white/10 py-4 rounded-2xl font-bold text-sm uppercase tracking-tighter border border-white/10 active:scale-95 transition">
                    <i class="fas fa-share-nodes mr-2"></i> Store Link
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 rounded-3xl">
                <div class="text-slate-500 text-[10px] font-bold uppercase mb-1">Customer Orders</div>
                <div class="text-xl font-bold" id="totalOrders">0</div>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <div class="text-slate-500 text-[10px] font-bold uppercase mb-1">Store Revenue</div>
                <div class="text-xl font-bold text-emerald-400" id="totalSales">₵0.00</div>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Terminal Controls</h3>
            
            <button onclick="window.location.href='agent_orders.html'" class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 text-indigo-500 flex items-center justify-center"><i class="fas fa-shopping-basket"></i></div>
                    <div class="text-left">
                        <div class="font-bold text-sm">View Store Sales</div>
                        <div class="text-[10px] text-slate-500">Track customer purchases</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition"></i>
            </button>

            <button onclick="window.location.href='setup_store.html'" class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-orange-500/10 text-orange-500 flex items-center justify-center"><i class="fas fa-tools"></i></div>
                    <div class="text-left">
                        <div class="font-bold text-sm">Store Setup</div>
                        <div class="text-[10px] text-slate-500">Edit link & WhatsApp</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition"></i>
            </button>

            <button onclick="window.location.href='dashboard.html'" class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-blue-500/10 text-blue-500 flex items-center justify-center"><i class="fas fa-user-circle"></i></div>
                    <div class="text-left">
                        <div class="font-bold text-sm">Personal Dashboard</div>
                        <div class="text-[10px] text-slate-500">Switch to main account</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition"></i>
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
            authDomain: "gigantic-data.firebaseapp.com",
            databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
            projectId: "gigantic-data"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUid = "";
        let storeSlug = "";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUid = user.uid;
                // Get user info
                onValue(ref(db, `users/${currentUid}`), (snap) => {
                    const data = snap.val();
                    if(data) {
                        document.getElementById('agentName').innerText = data.fullName || user.email;
                        storeSlug = data.storeSettings?.storeSlug || "";
                    }
                });
                
                // Start comprehensive profit sync
                syncStoreOnlyProfit();
            } else {
                window.location.href = "login.html";
            }
        });

        function syncStoreOnlyProfit() {
            // Path 1: Check user_orders/uid (If store orders are saved under agent's history)
            const personalOrdersRef = ref(db, `user_orders/${currentUid}`);
            
            onValue(personalOrdersRef, (snapshot) => {
                const orders = snapshot.val();
                calculateAndDisplay(orders);
            });

            // Path 2: Fallback - Check global 'orders' filtered by this agent's ID
            // This is useful if your system saves store orders globally
            const globalOrdersRef = query(ref(db, 'orders'), orderByChild('agentUid'), equalTo(currentUid));
            onValue(globalOrdersRef, (snapshot) => {
                if (snapshot.exists()) {
                    calculateAndDisplay(snapshot.val());
                }
            });
        }

        function calculateAndDisplay(orders) {
            let storeRevenue = 0;
            let storeOrderCount = 0;

            if (orders) {
                Object.values(orders).forEach(order => {
                    // FILTER LOGIC:
                    // 1. Must be Successful
                    // 2. Must either have isStoreOrder: true OR be placed by a customer (different from agent)
                    const isSuccessful = order.status === "Successful" || order.status === "completed" || !order.status;
                    const isCustomerOrder = order.isStoreOrder === true || (order.boughtBy && order.boughtBy !== currentUid);

                    if (isSuccessful && isCustomerOrder) {
                        const amount = parseFloat(order.amount || order.price || 0);
                        storeRevenue += amount;
                        storeOrderCount++;
                    }
                });
            }

            const storeProfit = storeRevenue * 0.15;

            // Update UI
            document.getElementById('profitBalance').innerText = `₵${storeProfit.toFixed(2)}`;
            document.getElementById('totalOrders').innerText = storeOrderCount;
            document.getElementById('totalSales').innerText = `₵${storeRevenue.toFixed(2)}`;
        }

        window.copyStoreLink = () => {
            if(!storeSlug) return alert("Please setup your store link first!");
            const link = `https://giganticdatahub.com/store?s=${storeSlug}`;
            navigator.clipboard.writeText(link);
            alert("Customer Store Link Copied!");
        };
    </script>
</body>
</html>
