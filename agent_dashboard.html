<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Hub | Gigantic Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050816; color: white; }
        .glass-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); }
        .accent-gradient { background: linear-gradient(135deg, #f97316 0%, #fb923c 100%); }
        .stat-glow { box-shadow: 0 0 20px rgba(249, 115, 22, 0.15); }
        
        /* Modal Animation */
        #withdrawModal { display: none; }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center border-b border-white/5">
        <div>
            <h1 class="text-xl font-bold tracking-tight">Agent Dashboard</h1>
            <p id="agentName" class="text-slate-400 text-xs italic">Syncing profile...</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-orange-500/20 border border-orange-500/30 flex items-center justify-center text-orange-500">
            <i class="fas fa-user-tie"></i>
        </div>
    </header>

    <div class="p-6 max-w-lg mx-auto space-y-6">
        
        <div class="glass-card rounded-[2.5rem] p-8 relative overflow-hidden stat-glow">
            <div class="absolute top-0 right-0 p-6 opacity-10 text-6xl"><i class="fas fa-wallet"></i></div>
            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-500">Available Profit</label>
            <div class="flex items-baseline gap-2 mt-2">
                <span class="text-4xl font-black italic" id="profitBalance">₵0.00</span>
            </div>
            
            <div class="grid grid-cols-2 gap-4 mt-8">
                <button onclick="openWithdrawModal()" class="accent-gradient py-4 rounded-2xl font-bold text-sm uppercase tracking-tighter shadow-lg shadow-orange-500/20 active:scale-95 transition">
                    <i class="fas fa-arrow-up-from-bracket mr-2"></i> Withdraw
                </button>
                <button onclick="copyStoreLink()" class="bg-white/10 py-4 rounded-2xl font-bold text-sm uppercase tracking-tighter border border-white/10 active:scale-95 transition">
                    <i class="fas fa-share-nodes mr-2"></i> Store Link
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="glass-card p-5 rounded-3xl">
                <div class="text-slate-500 text-[10px] font-bold uppercase mb-1">Total Orders</div>
                <div class="text-xl font-bold" id="totalOrders">0</div>
            </div>
            <div class="glass-card p-5 rounded-3xl">
                <div class="text-slate-500 text-[10px] font-bold uppercase mb-1">Total Earned</div>
                <div class="text-xl font-bold text-emerald-400" id="totalEarned">₵0.00</div>
            </div>
        </div>

        <div class="space-y-3">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-2">Terminal Controls</h3>
            
            <button onclick="window.location.href='agent_orders.html'" class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-indigo-500/10 text-indigo-500 flex items-center justify-center"><i class="fas fa-shopping-basket"></i></div>
                    <div class="text-left">
                        <div class="font-bold text-sm">Store Orders</div>
                        <div class="text-[10px] text-slate-500">View customer purchases</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition"></i>
            </button>

            <button onclick="window.location.href='setup_store.html'" class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-orange-500/10 text-orange-500 flex items-center justify-center"><i class="fas fa-tools"></i></div>
                    <div class="text-left">
                        <div class="font-bold text-sm">Store Settings</div>
                        <div class="text-[10px] text-slate-500">Edit name & WhatsApp</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition"></i>
            </button>

            <button onclick="window.location.href='dashboard.html'" class="w-full glass-card p-5 rounded-3xl flex items-center justify-between group hover:bg-white/5 transition">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 rounded-2xl bg-blue-500/10 text-blue-500 flex items-center justify-center"><i class="fas fa-user"></i></div>
                    <div class="text-left">
                        <div class="font-bold text-sm">Personal Dashboard</div>
                        <div class="text-[10px] text-slate-500">Switch to main account</div>
                    </div>
                </div>
                <i class="fas fa-chevron-right text-slate-600 group-hover:text-white transition"></i>
            </button>
        </div>

    </div>

    <div id="withdrawModal" class="fixed inset-0 z-[9999] flex items-end sm:items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closeWithdrawModal()"></div>
        <div class="modal-animate relative bg-[#11183d] w-full max-w-sm rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 border border-white/10 shadow-2xl">
            <div class="w-12 h-1 bg-white/10 rounded-full mx-auto mb-6 sm:hidden"></div>
            <h2 class="text-xl font-black uppercase mb-2">Profit Withdrawal</h2>
            <p class="text-slate-400 text-xs mb-6">Minimum withdrawal is ₵10.00</p>
            
            <div class="space-y-4">
                <input type="number" id="withdrawAmt" placeholder="Amount ₵" class="w-full bg-[#0a0e27] border border-white/10 p-5 rounded-2xl outline-none focus:border-orange-500 text-xl font-bold">
                <input type="tel" id="momoNumber" placeholder="Momo Number" class="w-full bg-[#0a0e27] border border-white/10 p-5 rounded-2xl outline-none focus:border-orange-500 font-bold">
                <button onclick="processWithdrawal()" id="confirmWithdrawBtn" class="w-full accent-gradient py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl active:scale-95 transition">
                    Confirm Cashout
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, get, update, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
            authDomain: "gigantic-data.firebaseapp.com",
            databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
            projectId: "gigantic-data"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);

        let currentUid = "";
        let currentProfit = 0;
        let storeSlug = "";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUid = user.uid;
                syncAgentData();
            } else {
                window.location.href = "login.html";
            }
        });

        function syncAgentData() {
            const userRef = ref(db, `users/${currentUid}`);
            onValue(userRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    currentProfit = data.referralBonus || 0;
                    storeSlug = data.storeSettings?.storeSlug || "";
                    
                    document.getElementById('profitBalance').innerText = `₵${currentProfit.toFixed(2)}`;
                    document.getElementById('agentName').innerText = data.fullName || user.email;
                    
                    // Fetch total earned (sum of commissions in order history)
                    fetchStats();
                }
            });
        }

        async function fetchStats() {
            const ordersRef = ref(db, `user_orders/${currentUid}`);
            const snap = await get(ordersRef);
            if(snap.exists()) {
                const orders = snap.val();
                const total = Object.keys(orders).length;
                let earned = 0;
                Object.values(orders).forEach(o => earned += (o.commission || 0));
                
                document.getElementById('totalOrders').innerText = total;
                document.getElementById('totalEarned').innerText = `₵${earned.toFixed(2)}`;
            }
        }

        window.openWithdrawModal = () => document.getElementById('withdrawModal').style.display = 'flex';
        window.closeWithdrawModal = () => document.getElementById('withdrawModal').style.display = 'none';

        window.copyStoreLink = () => {
            if(!storeSlug) return alert("Launch your store first!");
            const link = `https://giganticdatahub.com/store?s=${storeSlug}`;
            navigator.clipboard.writeText(link);
            alert("Store Link Copied!");
        };

        window.processWithdrawal = async () => {
            const amt = parseFloat(document.getElementById('withdrawAmt').value);
            const num = document.getElementById('momoNumber').value.trim();
            const btn = document.getElementById('confirmWithdrawBtn');

            if(amt < 10) return alert("Minimum withdrawal is ₵10");
            if(amt > currentProfit) return alert("Insufficient profit balance");
            if(num.length < 10) return alert("Enter a valid Momo number");

            btn.disabled = true;
            btn.innerText = "PROCESSING...";

            try {
                // 1. Create Withdrawal Request for Admin
                const requestRef = ref(db, 'withdrawal_requests');
                await push(requestRef, {
                    uid: currentUid,
                    email: auth.currentUser.email,
                    amount: amt,
                    momoNumber: num,
                    type: "Agent Profit",
                    status: "Pending",
                    timestamp: Date.now()
                });

                // 2. Deduct from User Balance
                const newBalance = currentProfit - amt;
                await update(ref(db, `users/${currentUid}`), {
                    referralBonus: parseFloat(newBalance.toFixed(2))
                });

                alert("Withdrawal request sent! Funds will arrive after admin approval.");
                closeWithdrawModal();
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerText = "CONFIRM CASHOUT";
            }
        };
    </script>
</body>
</html>
