<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Gigantic Data Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    /* PREVENT REDIRECT FLICKER: Hide body by default */
    #loading-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0a2a66; z-index: 9999; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif;
    }

    * { margin:0; padding:0; box-sizing:border-box; font-family:"Poppins", sans-serif; }
    body { background:#f0f4f9; color:#0a2a66; min-height:100vh; }

    header { 
        background:#0a2a66; color:#fff; display:flex; 
        justify-content:space-between; align-items:center; 
        padding:15px 5%; position:fixed; width:100%; top:0; z-index:100; 
    }
    .nav-buttons { display:flex; gap:8px; margin-top:10px; flex-wrap: wrap; }
    .nav-buttons button { 
        padding:8px 14px; border:none; border-radius:6px; 
        background:#1e90ff; color:#fff; font-weight:600; cursor:pointer; 
    }
    .container { padding: 180px 5% 40px; max-width:1300px; margin:auto; }
    .summary-boxes { display:flex; flex-wrap:wrap; gap:15px; margin-bottom:25px; }
    .summary-box { 
        background:#fff; padding:20px; border-radius:12px; 
        box-shadow:0 4px 15px rgba(0,0,0,0.05); flex:1; min-width:180px; 
        border-bottom: 4px solid #1e90ff;
    }
    .summary-box p { font-size:1.5rem; font-weight:700; }
    .card { background:#fff; padding:20px; border-radius:12px; margin-bottom:20px; }
    .btn-danger { background:#ff4d4f; color:#fff; border:none; padding:10px 18px; border-radius:8px; cursor:pointer; }
</style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-shield-alt fa-spin" style="font-size: 3rem; margin-bottom: 1rem;"></i>
    <p>Securing Admin Session...</p>
</div>

<header>
  <div>
    <h1>Gigantic Data — Admin</h1>
    <div class="nav-buttons">
      <button onclick="location.href='admin_dashboard.html'"><i class="fas fa-chart-line"></i> Dashboard</button>
      <button onclick="location.href='admin.html'" style="background:#ef4444">System</button>
      <button onclick="location.href='users.html'">Users</button>
      <button onclick="location.href='orders.html'">Orders</button>
    </div>
  </div>
  <button id="logoutBtn" class="btn-danger">Logout</button>
</header>

<div class="container">
  <div class="summary-boxes">
    <div class="summary-box"><h3>Users</h3><p id="totalUsers">0</p></div>
    <div class="summary-box"><h3>Orders</h3><p id="totalOrders">0</p></div>
    <div class="summary-box"><h3>Sales (₵)</h3><p id="totalSales">0.00</p></div>
    <div class="summary-box"><h3>Wallet (₵)</h3><p id="totalWallet">0.00</p></div>
  </div>

  <div class="card">
    <h3><i class="fas fa-terminal"></i> System Console</h3>
    <div id="consoleLog" style="font-size: 13px; color: #64748b; margin-top: 10px;">Connected to Firebase...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getDatabase, ref, get, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBmu4xukuT0Z7oD_vA9QroeO-1ZuaK8JgA",
    authDomain: "gigantic-data.firebaseapp.com",
    databaseURL: "https://gigantic-data-default-rtdb.firebaseio.com",
    projectId: "gigantic-data"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
const ADMIN_EMAIL = "alenacloft0@gmail.com";

// --- THE LOGIC THAT STOPS THE REDIRECT ---
setPersistence(auth, browserLocalPersistence).then(() => {
    onAuthStateChanged(auth, (user) => {
        const hasAdminFlag = sessionStorage.getItem('isAdmin') === 'true';

        if (user && user.email === ADMIN_EMAIL) {
            // AUTHORIZED: Remove overlay and show content
            sessionStorage.setItem('isAdmin', 'true');
            document.getElementById('loading-overlay').style.display = 'none';
            initDashboard();
        } else {
            // NOT AUTHORIZED OR NOT LOGGED IN
            if (!hasAdminFlag) {
                // No flag and no user? Boot them out immediately.
                window.location.replace("admin_login.html");
            } else {
                // Has flag but Firebase hasn't loaded user yet? 
                // We wait. The overlay stays up. No redirect happens yet.
                console.log("Waiting for Firebase sync...");
                
                // If after 5 seconds Firebase still hasn't found the user, 
                // then the session actually expired.
                setTimeout(() => {
                    if (!auth.currentUser) {
                        sessionStorage.removeItem('isAdmin');
                        window.location.replace("admin_login.html");
                    }
                }, 5000);
            }
        }
    });
});

function initDashboard() {
    onValue(ref(db, "orders"), async (snap) => {
        const orders = snap.exists() ? Object.values(snap.val()) : [];
        const usersSnap = await get(ref(db, "users"));
        const users = usersSnap.exists() ? usersSnap.val() : {};
        
        document.getElementById("totalUsers").textContent = Object.keys(users).length;
        document.getElementById("totalOrders").textContent = orders.length;
        
        const successOrders = orders.filter(o => ["completed","success","successful"].includes(String(o.status).toLowerCase()));
        const totalSales = successOrders.reduce((sum, o) => sum + Number(o.amount || o.price || 0), 0);
        document.getElementById("totalSales").textContent = totalSales.toFixed(2);
        
        const totalWallet = Object.values(users).reduce((sum, u) => sum + Number(u.balance || u.wallet || 0), 0);
        document.getElementById("totalWallet").textContent = totalWallet.toFixed(2);
    });
}

document.getElementById("logoutBtn").onclick = () => {
    sessionStorage.removeItem('isAdmin');
    signOut(auth).then(() => window.location.replace("admin_login.html"));
};
</script>
</body>
</html>
